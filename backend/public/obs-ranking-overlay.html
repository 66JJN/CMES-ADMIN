<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>OBS Ranking Overlay</title>
  <style>
    /* ===== สไตล์พื้นฐาน ===== */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ===== คอนเทนเนอร์หลักสำหรับแสดงอันดับ ===== */
    #ranking-container {
      position: fixed;
      top: 20px;
      right: 0;
      width: 300px;
      background: transparent;
      padding: 10px 0 10px 10px;
      color: white;
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        0 2px 4px rgba(0, 0, 0, 0.9);
    }

    /* ===== หัวข้อ Top Supporter ===== */
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      text-align: right;
      /* Changed from center to right */
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow:
        -2px -2px 0 #000,
        2px -2px 0 #000,
        -2px 2px 0 #000,
        2px 2px 0 #000;
    }

    /* ===== แต่ละรายการของ Ranking ===== */
    .rank-item {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      /* Align items to the right */
      padding: 8px 0;
      /* border-bottom: 1px solid rgba(255,255,255,0.1); Removed border to look cleaner transparent */
    }

    .rank-item:last-child {
      border-bottom: none;
    }

    /* ===== หมายเลขอันดับ ===== */
    .rank-num {
      width: 24px;
      font-weight: bold;
      color: #9ca3af;
      text-align: center;
      /* Keep rank number centered in its box */
      order: 3;
      /* Move rank number to the rightmost */
      margin-left: 10px;
      /* Add margin left */
    }

    /* สีสำหรับอันดับ 1-3 */
    .rank-num.top-1 {
      color: #fbbf24;
      font-size: 1.2em;
    }

    /* ทอง */
    .rank-num.top-2 {
      color: #94a3b8;
      font-size: 1.1em;
    }

    /* เงิน */
    .rank-num.top-3 {
      color: #b45309;
      font-size: 1.1em;
    }

    /* ทองแดง */

    /* ===== รูปโปรไฟล์ ===== */
    .rank-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-left: 10px;
      /* Changed from margin-right to margin-left */
      margin-right: 0;
      background: #333;
      object-fit: cover;
      order: 2;
      /* Move avatar to the middle */
    }

    /* ===== ข้อมูลผู้ใช้ (ชื่อ + คะแนน) ===== */
    .rank-info {
      flex: 1;
      overflow: hidden;
      text-align: right;
      /* Align text to the right */
      order: 1;
      /* Move info to the leftmost (visually rightmost in RTL thinking, but here we just reorder) */
    }

    /* ชื่อผู้ใช้ */
    .rank-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* คะแนน */
    .rank-points {
      font-size: 0.85em;
      color: #4ade80;
    }
  </style>
</head>

<body>
  <!-- คอนเทนเนอร์หลักสำหรับแสดง Ranking -->
  <div id="ranking-container">
    <h2>Top Supporter</h2>
    <!-- รายการ Ranking (จะถูกเติมด้วย JavaScript) -->
    <div id="ranking-list">
      <!-- รายการจะถูกแทรกที่นี่ -->
      <div style="text-align:center; color:#666;">Loading...</div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // ===== การตั้งค่า URL และเชื่อมต่อ Socket.IO =====
    const REALTIME_URL = window.location.origin;
    const API_BASE_URL = window.location.origin;

    // 🔥 อ่าน shopId จาก URL ?shopId=KAIYANG
    const urlParams = new URLSearchParams(window.location.search);
    const shopId = urlParams.get('shopId') || '';
    console.log('[OBS Ranking] shopId from URL:', shopId);

    // 🔥 เชื่อมต่อ socket พร้อมส่ง shopId เพื่อเข้า room เฉพาะร้าน
    const socket = io(REALTIME_URL, {
      transports: ['websocket', 'polling'],
      query: { shopId }
    });
    const listEl = document.getElementById('ranking-list');

    // ===== ฟังก์ชันแสดงผล Ranking =====
    function renderRanking(rankings) {
      // ตรวจสอบว่ามีข้อมูลหรือไม่
      if (!rankings || rankings.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; color:#666;">No data</div>';
        return;
      }

      // สร้าง HTML สำหรับแต่ละรายการ
      listEl.innerHTML = rankings.map((r, index) => {
        const rank = index + 1; // อันดับเริ่มจาก 1
        const rankClass = rank <= 3 ? `top-${rank}` : ''; // เพิ่มคลาสพิเศษสำหรับ 3 อันดับแรก
        const avatarUrl = r.avatar || '/data-icon/unknown-person-icon.png'; // ใช้รูป default ถ้าไม่มี

        return `
          <div class="rank-item">
            <div class="rank-num ${rankClass}">${rank}</div>
            <img src="${avatarUrl}" class="rank-avatar" onerror="this.src='/data-icon/unknown-person-icon.png'" />
            <div class="rank-info">
              <div class="rank-name">${r.name}</div>
              <div class="rank-points">${r.points.toLocaleString()} pts</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ===== ฟังก์ชันดึงข้อมูล Ranking จาก API =====
    async function fetchRanking() {
      try {
        const res = await fetch(`${API_BASE_URL}/api/rankings/top`, {
          headers: { 'x-shop-id': shopId }  // 🔥 ส่ง shopId
        });
        if (res.ok) {
          const json = await res.json();
          // API คืนค่า { success: true, ranks: [...] }
          if (json.success && Array.isArray(json.ranks)) {
            renderRanking(json.ranks);
          } else if (Array.isArray(json)) {
            // กรณี API คืนค่าเป็น array โดยตรง
            renderRanking(json);
          }
        }
      } catch (err) {
        console.error('Error fetching ranking:', err);
      }
    }

    // ดึงข้อมูลครั้งแรกเมื่อเริ่มโหลดหน้า
    fetchRanking();

    // ===== รับการอัปเดตแบบ Real-time ผ่าน Socket.IO =====
    socket.on('ranking-update', (data) => {
      console.log('Ranking update received:', data);
      renderRanking(data);
    });

    // รีเฟรชข้อมูลทุก 30 วินาที (เผื่อกรณีที่ socket ขาดหาย)
    setInterval(fetchRanking, 30000);
  </script>
</body>

</html>
