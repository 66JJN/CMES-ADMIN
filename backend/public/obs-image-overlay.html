<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <title>OBS Combined Overlay</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Prompt', 'Kanit', 'Segoe UI', sans-serif;
    }

    #container {
      position: fixed;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      max-width: 95vw;
      opacity: 0;
      transition: opacity 0.35s ease, transform 0.35s ease;
      display: flex;
      gap: 24px;
      align-items: center;
      pointer-events: none;
    }

    #container.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* === Layout Variants === */
    #container.layout-left {
      flex-direction: row-reverse;
    }

    #container.layout-top {
      flex-direction: column-reverse;
    }

    #container.layout-top #info-section {
      flex-direction: row;
      min-width: auto;
    }

    #container.layout-bottom {
      flex-direction: column;
    }

    #container.layout-bottom #info-section {
      flex-direction: row;
      min-width: auto;
    }

    #container.layout-center {
      position: fixed;
      bottom: 10%;
      left: 50%;
    }

    #container.layout-center #info-section {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 12px;
      z-index: 2;
    }

    /* ส่วนรูปภาพ */
    #image-section {
      flex-shrink: 0;
    }

    #thumb {
      width: auto;
      height: auto;
      max-width: 600px;
      max-height: 70vh;
      border-radius: 12px;
      object-fit: contain;
      display: block;
    }

    /* ส่วนข้อความและ QR Code */
    #info-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      justify-content: center;
      min-width: 250px;
      padding: 24px;
    }

    /* Social */
    #social-container {
      display: none;
      align-items: center;
      gap: 12px;
    }

    #social-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    #social-name {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
    }

    /* Text */
    #text {
      font-size: 24px;
      font-weight: 400;
      color: #fff;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
      text-align: center;
      max-width: 400px;
      word-wrap: break-word;
    }

    #text.black {
      color: #000;
      text-shadow: 0 3px 10px rgba(255, 255, 255, 0.9);
    }

    /* QR Code */
    #qr-container {
      display: none;
    }

    #qr-image {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      object-fit: contain;
      background: white;
      padding: 8px;
    }

    /* Countdown Timer */
    #countdown-timer {
      margin-top: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      min-width: 70px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
    }

    #countdown-timer.show {
      opacity: 1;
    }

    /* ======================================
       CYBERPUNK GIFT CARD FOR OBS
       ====================================== */
    #gift-container {
      position: fixed;
      bottom: 3%;
      left: 50%;
      transform: translateX(-50%) translateY(20px) scale(0);
      opacity: 0;
      max-width: 650px;
      width: 85%;
      pointer-events: none;
      z-index: 100;
    }

    #gift-container.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(0.7);
      transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .cyberpunk-gift-card {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(22, 33, 62, 0.95) 100%);
      backdrop-filter: blur(20px);
      border: 3px solid #ffd700;
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow:
        0 0 60px rgba(255, 215, 0, 0.5),
        0 15px 80px rgba(0, 0, 0, 0.7);
      position: relative;
      overflow: hidden;
      animation: cardPulse 2s ease-in-out infinite;
    }

    @keyframes cardPulse {

      0%,
      100% {
        box-shadow: 0 0 60px rgba(255, 215, 0, 0.5), 0 20px 80px rgba(0, 0, 0, 0.7);
      }

      50% {
        box-shadow: 0 0 80px rgba(255, 215, 0, 0.7), 0 20px 80px rgba(0, 0, 0, 0.7);
      }
    }

    .gift-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      animation: flash 2s ease-in-out infinite;
    }

    @keyframes flash {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.8;
      }
    }

    .gift-header-title {
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      text-transform: uppercase;
      letter-spacing: 2px;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
    }

    @keyframes shimmer {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 200% 50%;
      }
    }

    .gift-sparkle {
      font-size: 2.5rem;
      animation: sparkle 2s ease-in-out infinite;
      display: inline-block;
    }

    .gift-sparkle:nth-child(1) {
      animation-delay: 0s;
    }

    .gift-sparkle:nth-child(4) {
      animation-delay: 1s;
    }

    @keyframes sparkle {

      0%,
      100% {
        transform: rotate(0deg) scale(1);
      }

      25% {
        transform: rotate(20deg) scale(1.3);
      }

      75% {
        transform: rotate(-20deg) scale(1.3);
      }
    }

    .gift-sender {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .gift-avatar-ring {
      padding: 5px;
      background: linear-gradient(135deg, #ffd700, #00ffff, #ff00ff, #ffd700);
      background-size: 300% 300%;
      border-radius: 50%;
      animation: rotateRing 4s linear infinite;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
    }

    @keyframes rotateRing {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .gift-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .gift-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gift-avatar-initial {
      font-size: 4.5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
    }

    .gift-sender-name {
      font-size: 2.2rem;
      font-weight: 900;
      color: #ffd700;
      text-shadow: 0 0 25px rgba(255, 215, 0, 1);
      animation: namePulse 2s ease-in-out infinite;
      text-align: center;
    }

    @keyframes namePulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    .gift-arrow {
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #00ffff;
      text-shadow: 0 0 15px rgba(0, 255, 255, 0.9);
      margin: 0.8rem 0;
      animation: arrowBounce 2s ease-in-out infinite;
    }

    @keyframes arrowBounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    .gift-table {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .gift-table-badge {
      background: rgba(0, 255, 255, 0.15);
      border: 4px solid #00ffff;
      color: #00ffff;
      padding: 1.2rem 3.5rem;
      border-radius: 60px;
      font-size: 3.5rem;
      font-weight: 900;
      text-shadow:
        0 0 25px rgba(0, 255, 255, 1),
        0 0 50px rgba(0, 255, 255, 0.8);
      box-shadow:
        0 0 40px rgba(0, 255, 255, 0.6),
        inset 0 0 30px rgba(0, 255, 255, 0.2);
      animation: tablePulse 2s ease-in-out infinite;
    }

    @keyframes tablePulse {

      0%,
      100% {
        box-shadow: 0 0 40px rgba(0, 255, 255, 0.6), inset 0 0 30px rgba(0, 255, 255, 0.2);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 60px rgba(0, 255, 255, 0.9), inset 0 0 40px rgba(0, 255, 255, 0.4);
        transform: scale(1.08);
      }
    }

    .gift-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      margin: 1.5rem 0;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    }

    .gift-items-wrapper {
      overflow: hidden;
      margin: 1.5rem 0;
      position: relative;
    }

    .gift-items {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: nowrap;
    }

    /* Marquee animation เมื่อมีสินค้ามากกว่า 2 ชิ้น */
    .gift-items.marquee {
      justify-content: flex-start;
      animation: marqueeScroll var(--marquee-duration, 12s) linear infinite;
    }

    @keyframes marqueeScroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .gift-item {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 215, 0, 0.4);
      border-radius: 18px;
      padding: 1.2rem;
      width: 140px;
      flex-shrink: 0;
      text-align: center;
      position: relative;
      transition: all 0.3s ease;
    }

    .gift-item:hover {
      transform: translateY(-8px);
      border-color: #ffd700;
      box-shadow: 0 12px 35px rgba(255, 215, 0, 0.5);
    }

    .gift-item img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      /* เปลี่ยนจาก cover เป็น contain */
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      padding: 0.2rem;
      margin-bottom: 0.5rem;
    }

    .gift-item-qty {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #ff1744;
      color: #fff;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 900;
      box-shadow: 0 4px 15px rgba(255, 23, 68, 0.7);
      animation: qtyPulse 2s ease-in-out infinite;
    }

    @keyframes qtyPulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.15);
      }
    }

    .gift-item-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      margin-top: 0.3rem;
    }

    .gift-note {
      background: rgba(255, 215, 0, 0.12);
      border: 2px solid rgba(255, 215, 0, 0.5);
      border-radius: 18px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: center;
    }

    .gift-note-text {
      font-size: 1.3rem;
      font-style: italic;
      font-weight: 600;
      color: #ffd700;
      text-shadow: 0 2px 12px rgba(255, 215, 0, 0.6);
    }

    .gift-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 255, 255, 0.12);
      border: 2px solid rgba(0, 255, 255, 0.5);
      border-radius: 18px;
      padding: 1.5rem 2rem;
      margin-top: 2rem;
    }

    .gift-total-label {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
    }

    .gift-total-price {
      font-size: 2.8rem;
      font-weight: 900;
      color: #00ffff;
      text-shadow:
        0 0 20px rgba(0, 255, 255, 1),
        0 0 40px rgba(0, 255, 255, 0.7);
      animation: priceGlow 2s ease-in-out infinite;
    }

    @keyframes priceGlow {

      0%,
      100% {
        text-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 255, 255, 0.7);
      }

      50% {
        text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 255, 255, 0.9);
      }
    }
  </style>
</head>

<body>
  <!-- ส่วนแสดงรูปภาพ/ข้อความ -->
  <div id="container">
    <!-- รูปภาพด้านซ้าย -->
    <div id="image-section">
      <img id="thumb" alt="preview" />
    </div>

    <!-- ข้อความและ QR Code ด้านขวา -->
    <div id="info-section">
      <!-- ชื่อโซเชียล -->
      <div id="social-container">
        <img id="social-logo" alt="" />
        <span id="social-name"></span>
      </div>

      <!-- ข้อความ -->
      <div id="text"></div>

      <!-- คิวอาร์โค้ด -->
      <div id="qr-container">
        <img id="qr-image" alt="QR Code" />
      </div>
      <!-- ตัวนับถอยหลัง -->
      <div id="countdown-timer">0:00</div>
    </div>
  </div>

  <!-- ส่วนแสดงการ์ดของขวัญ Cyberpunk -->
  <div id="gift-container">
    <div class="cyberpunk-gift-card">
      <!-- ส่วนหัว -->
      <div class="gift-header">
        <span class="gift-sparkle">✨</span>
        <h2 class="gift-header-title">NEW GIFT INCOMING!</h2>
        <span class="gift-sparkle">✨</span>
      </div>

      <!-- ผู้ส่ง -->
      <div class="gift-sender">
        <div class="gift-avatar-ring">
          <div class="gift-avatar" id="gift-avatar">
            <span class="gift-avatar-initial" id="gift-avatar-initial">G</span>
          </div>
        </div>
        <div class="gift-sender-name" id="gift-sender-name">⭐ คุณ Guest ⭐</div>
      </div>

      <!-- ลูกศร -->
      <div class="gift-arrow">⬇️ จัดส่งให้ ⬇️</div>

      <!-- โต๊ะ -->
      <div class="gift-table">
        <div class="gift-table-badge" id="gift-table-number">โต๊ะ 1</div>
      </div>

      <!-- เส้นแบ่ง -->
      <div class="gift-divider"></div>

      <!-- รายการสินค้า -->
      <div class="gift-items-wrapper">
        <div class="gift-items" id="gift-items"></div>
      </div>

      <!-- เส้นแบ่ง -->
      <div class="gift-divider"></div>

      <!-- หมายเหตุ -->
      <div class="gift-note" id="gift-note-section" style="display: none;">
        <p class="gift-note-text" id="gift-note-text"></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const REALTIME_URL = window.location.origin;
    const API_BASE_URL = window.location.origin;

    // 🔥 อ่าน shopId จาก URL ?shopId=KAIYANG
    const urlParams = new URLSearchParams(window.location.search);
    const shopId = urlParams.get('shopId') || '';
    console.log('[OBS] shopId from URL:', shopId);

    // 🔥 เชื่อมต่อ socket พร้อมส่ง shopId เพื่อเข้า room เฉพาะร้าน
    const socket = io(API_BASE_URL, {
      transports: ['websocket', 'polling'],
      query: { shopId }
    });

    // เก็บการตั้งค่ารูปภาพสินค้า
    let giftSettingsItems = [];

    // ฟังก์ชันดึงการตั้งค่ารูปภาพ
    async function fetchGiftSettings() {
      try {
        const response = await fetch(`${API_BASE_URL}/api/gifts/settings`, {
          headers: { 'x-shop-id': shopId }  // 🔥 ส่ง shopId
        });
        if (response.ok) {
          const data = await response.json();
          giftSettingsItems = data.items || [];
          console.log("[OBS] Gift Settings Loaded:", giftSettingsItems);
        }
      } catch (error) {
        console.error("[OBS] Error fetching gift settings:", error);
      }
    }

    // เรียกดึงข้อมูลเมื่อโหลดหน้า
    fetchGiftSettings();

    const container = document.getElementById('container');
    const thumb = document.getElementById('thumb');
    const imageSection = document.getElementById('image-section');
    const infoSection = document.getElementById('info-section');

    // โซเชียล
    const socialContainer = document.getElementById('social-container');
    const socialLogo = document.getElementById('social-logo');
    const socialName = document.getElementById('social-name');

    // ข้อความ
    const textEl = document.getElementById('text');

    // คิวอาร์โค้ด
    const qrContainer = document.getElementById('qr-container');
    const qrImage = document.getElementById('qr-image');

    let hideTimer = null;
    let countdownInterval = null; // เก็บ interval สำหรับ countdown
    let isPaused = false; // สถานะหยุดชั่วคราว
    let remainingTime = 0; // เวลาที่เหลืออยู่เมื่อหยุด
    let currentId = null; // ID ของ item ที่กำลังเล่นอยู่

    const logoMap = {
      ig: `${API_BASE_URL}/data-icon/ig-logo.png`,
      fb: `${API_BASE_URL}/data-icon/facebook-logo.png`,
      line: `${API_BASE_URL}/data-icon/line-logo.png`,
      tiktok: `${API_BASE_URL}/data-icon/tiktok-logo.png`
    };

    function show(payload = {}) {
      console.log('[Combined Overlay] Received payload:', payload);

      // ลบข้อมูลก่อนหน้า
      clearInterval(countdownInterval);
      clearTimeout(hideTimer);
      clearTimeout(giftHideTimer);

      // รีเซ็ตสถานะการนับถอยหลัง/หยุด
      const timerEl = document.getElementById('countdown-timer');
      if (timerEl) {
        timerEl.classList.remove('show');
        timerEl.textContent = "0:00";
      }
      isPaused = false;

      // Track current playing item ID
      currentId = payload.id || null;

      const {
        sender, price, time, filePath, text, textColor,
        socialColor, textLayout,
        socialType, socialName: socName, qrCodePath,
        width, height, duration, seconds, remainingSeconds, timeLeft,
        playingAt // ใช้เพื่อ Sync เวลากับ Server
      } = payload;

      console.log('[Debug] socialType:', socialType, 'socName:', socName);
      console.log('[Debug] qrCodePath:', qrCodePath);
      console.log('[Debug] text:', text, 'textColor:', textColor);

      let hasContent = false;

      // แสดงรูปภาพ
      if (filePath) {
        let resolved = filePath;
        if (!resolved.startsWith('http')) {
          if (!resolved.startsWith('/')) {
            resolved = `/uploads/user-uploads/${resolved}`;
          }
          resolved = `${API_BASE_URL}${resolved}`;
        }

        thumb.src = resolved;
        thumb.style.display = 'block';
        imageSection.style.display = 'block';

        // ปรับขนาดถ้ามี
        if (width && !isNaN(width)) {
          thumb.style.width = `${Math.max(50, Math.min(4000, Number(width)))}px`;
        } else {
          thumb.style.width = 'auto';
        }

        if (height && !isNaN(height)) {
          thumb.style.height = `${Math.max(50, Math.min(4000, Number(height)))}px`;
        } else {
          thumb.style.height = 'auto';
        }

        hasContent = true;
      } else {
        imageSection.style.display = 'none';
      }

      // แสดง Social
      if (socialType && socName) {
        console.log('[Debug] Showing social:', socialType, socName);
        const logoSrc = logoMap[socialType];
        console.log('[Debug] Logo path:', logoSrc);
        if (logoSrc) {
          socialLogo.src = logoSrc;
          socialName.textContent = socName;
          // ใช้ socialColor ถ้ามี
          if (socialColor && socialColor !== '#ffffff' && socialColor !== 'white') {
            socialName.style.color = socialColor;
          } else {
            socialName.style.color = '';
          }
          socialContainer.style.display = 'flex';
          hasContent = true;
          console.log('[Debug] Social displayed with color:', socialColor);
        } else {
          console.warn('[Debug] No logo found for:', socialType);
        }
      } else {
        socialContainer.style.display = 'none';
        console.log('[Debug] No social data');
      }

      // แสดงข้อความ
      if (text) {
        textEl.textContent = text;
        // ใช้ textColor เป็น hex color โดยตรง
        if (textColor && textColor.startsWith('#')) {
          textEl.className = '';
          textEl.style.color = textColor;
        } else {
          textEl.className = textColor === 'black' ? 'black' : '';
          textEl.style.color = '';
        }
        textEl.style.display = 'block';
        hasContent = true;
      } else {
        textEl.style.display = 'none';
      }

      // ใช้ textLayout เปลี่ยน layout ของ container
      container.className = '';
      if (textLayout && textLayout !== 'right') {
        container.classList.add('layout-' + textLayout);
      }

      // แสดง QR Code
      if (qrCodePath) {
        console.log('[Debug] Processing QR Code:', qrCodePath);
        let resolvedQR = qrCodePath;
        if (!resolvedQR.startsWith('http')) {
          if (!resolvedQR.startsWith('/')) {
            resolvedQR = `/uploads/qr-codes/${resolvedQR}`;
          }
          resolvedQR = `${API_BASE_URL}${resolvedQR}`;
        }

        console.log('[Debug] QR Code URL:', resolvedQR);
        qrImage.src = resolvedQR;
        qrContainer.style.display = 'block';
        hasContent = true;
        console.log('[Debug] QR Code displayed');
      } else {
        qrContainer.style.display = 'none';
        console.log('[Debug] No QR Code data');
      }

      // แสดง container
      if (hasContent) {
        container.classList.add('show');
        timerEl.classList.add('show');

        // คำนวณเวลาสิ้นสุด
        // ใช้ playingAt จาก server ถ้ามี เพื่อความแม่นยำ Sync กัน
        const timeCandidate = [time, duration, seconds, remainingSeconds, timeLeft].find(v => v != null && !isNaN(v));
        const durationSec = Number(timeCandidate || 10);

        let startTime = Date.now();
        if (playingAt) {
          startTime = new Date(playingAt).getTime();
        }
        const endTime = startTime + (durationSec * 1000);

        // Update Timer Function
        const updateTimer = () => {
          // ถ้า Server Paused เวลาจะหยุดเดินที่ Server ด้วยหรือไม่?
          // ถ้า Server เป็นคนคุมเวลาและ Aging ตลอด เราไม่ควรหยุด Stop ตาม isPaused
          // แต่ถ้า isPaused หมายถึง "ซ่อนชั่วคราว" ?
          // ตาม Code ImageQueue เวลานับถอยหลังต่อ ดังนั้น OBS ก็นับต่อ
          // if (isPaused) return;

          const now = Date.now();
          const leftMs = endTime - now;
          const leftSec = Math.ceil(leftMs / 1000);

          if (leftSec >= 0) {
            const m = Math.floor(leftSec / 60);
            const s = leftSec % 60;
            timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
          } else {
            timerEl.textContent = "0:00";
            // Check Expiry (allow 2s buffer for network latency)
            if (leftSec < -2) {
              clearInterval(countdownInterval);
              container.classList.remove('show');
              timerEl.classList.remove('show');
              if (payload.id) {
                // แจ้ง server ว่าจบแล้ว (แม้ server จะ auto-complete เองก็ตาม)
                // socket.emit('complete-playing', payload.id); 
              }
            }
          }
        };

        updateTimer();
        countdownInterval = setInterval(updateTimer, 250);
      }
    }

    socket.on('connect', () => console.log('[Combined Overlay] Connected', socket.id));
    socket.on('now-playing-image', show);
    socket.on('now-playing-gift', showGift);

    // รับสัญญาณหยุดชั่วคราว
    socket.on('pause-display', (data) => {
      console.log('[OBS] Pause display received:', data);
      isPaused = true;

      // อัปเดตการนับถอยหลัง
      const timerEl = document.getElementById('countdown-timer');

      // ถ้าเป็นโหมดนับถอยหลังรอคิว (Auto Delay) ให้ซ่อนการแสดงผลทั้งหมด
      if (data && data.isCountingDown) {
        container.classList.remove('show');
        if (timerEl) timerEl.classList.remove('show');
      }
      // ถ้าเป็นการหยุด manual (active pause) อาจจะแสดง timer หรือไม่ก็ได้ (ตามเดิมคือไม่แสดงอะไร แค่หยุด)
      else if (timerEl && data && data.remaining !== undefined) {
        // timerEl.textContent = ...; // User requested NO countdown on OBS
        // So we do nothing visual here, just keep state paused
      }
    });

    // รับสัญญาณเริ่มต่อ
    socket.on('resume-display', (data) => {
      console.log('[OBS] Resume display received:', data);
      isPaused = false;
      const timerEl = document.getElementById('countdown-timer');
      if (timerEl) timerEl.classList.remove('show');
    });

    // รับสัญญาณข้ามคิว
    socket.on('skip-current', () => {
      console.log('[OBS] Skip current received');
      // ซ่อนการแสดงทันที
      clearTimeout(hideTimer);
      clearInterval(countdownInterval);
      clearTimeout(giftHideTimer);
      container.classList.remove('show');
      giftContainer.classList.remove('show');
      const timerEl = document.getElementById('countdown-timer');
      timerEl.classList.remove('show');
      isPaused = false;
      remainingTime = 0;

      // แจ้ง server ให้เปลี่ยนสถานะ item เป็น completed เพื่อไม่ให้ค้างใน queue
      if (currentId) {
        console.log('[OBS] Sending complete-playing for skipped item:', currentId);
        socket.emit('complete-playing', currentId);
        currentId = null;
      }
    });


    // แสดงออเดอร์ของขวัญ
    const giftContainer = document.getElementById('gift-container');
    const giftAvatar = document.getElementById('gift-avatar');
    const giftAvatarInitial = document.getElementById('gift-avatar-initial');
    const giftSenderName = document.getElementById('gift-sender-name');
    const giftTableNumber = document.getElementById('gift-table-number');
    const giftItems = document.getElementById('gift-items');
    const giftNoteSection = document.getElementById('gift-note-section');
    const giftNoteText = document.getElementById('gift-note-text');

    let giftHideTimer = null;

    function showGift(payload = {}) {
      console.log('[Gift Overlay] Received:', payload);

      // Track current playing item ID
      currentId = payload.id || null;

      // ซ่อน container เก่า (รูปภาพ/ข้อความ)
      container.classList.remove('show');
      clearTimeout(hideTimer);

      const {
        sender = 'Guest',
        avatar = null,
        tableNumber = 1,
        items = [],
        note = '',
        totalPrice = 0,
        time = 30,
        duration = 30
      } = payload;

      // บันทึกข้อมูล Debug
      console.log('[Gift] Sender:', sender);
      console.log('[Gift] Items:', items);
      console.log('[Gift] Items length:', items.length);
      console.log('[Gift] Gift Settings:', giftSettingsItems);

      // ตั้งค่าข้อมูลผู้ส่ง
      giftSenderName.textContent = `⭐ คุณ ${sender} ⭐`;

      // ตั้งค่ารูปโปรไฟล์
      if (avatar) {
        // รูปโปรไฟล์มาจาก User Backend (port 4000)
        // ถ้าเป็น URL เต็ม ใช้โดยตรง ถ้าเป็น path สัมพัทธ์ ใส่ URL backend ด้านหน้า
        // อาจเป็นรูปจาก Google ซึ่งเป็น URL เต็ม
        const avatarUrl = (avatar.startsWith && avatar.startsWith('http')) ? avatar : `https://cmes-user.onrender.com${avatar}`;
        console.log('[OBS] Loading avatar:', avatarUrl);

        const avatarImg = document.createElement('img');
        avatarImg.src = avatarUrl;
        avatarImg.style.width = '100%';
        avatarImg.style.height = '100%';
        avatarImg.style.objectFit = 'cover';

        avatarImg.onerror = () => {
          console.warn('[OBS] Avatar load failed, falling back to initial.');
          giftAvatar.innerHTML = `<span class="gift-avatar-initial">${sender.charAt(0).toUpperCase()}</span>`;
        };

        // ล้างเนื้อหาเดิมและเพิ่มรูปใหม่
        giftAvatar.innerHTML = '';
        giftAvatar.appendChild(avatarImg);
      } else {
        giftAvatar.innerHTML = `<span class="gift-avatar-initial">${sender.charAt(0).toUpperCase()}</span>`;
      }

      // ตั้งค่าหมายเลขโต๊ะ
      giftTableNumber.textContent = `โต๊ะ ${tableNumber}`;

      // ตั้งค่ารายการสินค้า
      if (!items || items.length === 0) {
        console.warn('[Gift] No items found in payload!');
        giftItems.innerHTML = `
          <div style="text-align:center;color:#ffd700;padding:2rem;font-size:1.2rem;">
            ไม่มีรายการสินค้า
          </div>
        `;
        giftItems.classList.remove('marquee');
      } else {
        console.log('[Gift] Rendering', items.length, 'items');

        const renderItem = (item, idx) => {
          console.log(`[Gift] Item ${idx}:`, item);

          // Logic ค้นหารูปภาพเหมือนใน Admin
          let itemImage = item.image;
          if (!itemImage && giftSettingsItems.length > 0) {
            // 1. ค้นหาด้วย id
            let setting = giftSettingsItems.find(s => s.id === item.id);
            // 2. ถ้าไม่เจอ ลองค้นหาด้วยชื่อ
            if (!setting) {
              setting = giftSettingsItems.find(s => s.name === item.name);
            }
            console.log(`[Gift] Looking for id=${item.id} name=${item.name}, found setting:`, setting);
            if (setting && setting.imageUrl) {
              itemImage = setting.imageUrl;
              console.log('[Gift] Using image from settings:', itemImage);
            }
          }

          // ถ้ามีรูป
          const imgHtml = itemImage
            ? `<img src="${(itemImage.startsWith && itemImage.startsWith('http')) ? itemImage : API_BASE_URL + itemImage}" alt="${item.name}" />`
            : `<div style="width:100px;height:100px;background:rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 0.5rem;font-size:2rem;color:#777;">?</div>`;

          return `
          <div class="gift-item">
            ${imgHtml}
            <span class="gift-item-qty">x${item.quantity}</span>
            <div class="gift-item-name">${item.name}</div>
          </div>`;
        };

        // ถ้ามากกว่า 2 items → ใช้ marquee (แสดงแถวเดียวเลื่อนซ้าย)
        if (items.length > 2) {
          // Duplicate items เพื่อให้ marquee ต่อเนื่อง
          const itemsHtml = items.map(renderItem).join('');
          giftItems.innerHTML = itemsHtml + itemsHtml; // ซ้ำ 2 ชุดเพื่อให้วนต่อเนื่อง
          giftItems.classList.add('marquee');
          // ปรับความเร็วตามจำนวน items (ยิ่งเยอะยิ่งนาน)
          const duration = Math.max(8, items.length * 4);
          giftItems.style.setProperty('--marquee-duration', duration + 's');
        } else {
          // 1-2 items → แสดงปกติตรงกลาง
          giftItems.innerHTML = items.map(renderItem).join('');
          giftItems.classList.remove('marquee');
          giftItems.style.removeProperty('--marquee-duration');
        }
      }

      // ตั้งค่าหมายเหตุ
      if (note) {
        giftNoteText.textContent = `"${note}"`;
        giftNoteSection.style.display = 'block';
      } else {
        giftNoteSection.style.display = 'none';
      }

      // แสดงส่วนของขวัญ
      giftContainer.classList.add('show');

      // ใช้เวลาจาก payload (30 วินาที)
      const displayTime = time || duration || 30;
      console.log('[Gift] Display time:', displayTime, 'seconds');

      // ซ่อนหลังจากครบระยะเวลา
      clearTimeout(giftHideTimer);
      giftHideTimer = setTimeout(() => {
        giftContainer.classList.remove('show');
        if (payload.id) {
          socket.emit('complete-playing', payload.id);
        }
      }, displayTime * 1000);
    }
  </script>

    // --- ตรรกะวงล้อโชคดี ---

    const wheelCountdownText = document.getElementById('wheel-countdown-text');
    const wheelWinnerModal = document.getElementById('wheel-winner-modal');
    const wheelWinnerName = document.getElementById('wheel-winner-name');
    const wheelWinnerReward = document.getElementById('wheel-winner-reward');

    const defaultColors = [
      "#f87171", "#fbbf24", "#34d399", "#60a5fa", "#a78bfa", "#f472b6", "#facc15", "#4ade80", "#38bdf8", "#818cf8"
    ];

    function generateWheelSVG(segments) {
      const segs = segments.length;
      const arc = 2 * Math.PI / segs;
      const radius = 160;
      const viewBox = 360;
      const center = viewBox / 2;

      let paths = segments.map((seg, i) => {
        const startAngle = i * arc - Math.PI / 2;
        const endAngle = (i + 1) * arc - Math.PI / 2;
        const x1 = radius * Math.cos(startAngle);
        const y1 = radius * Math.sin(startAngle);
        const x2 = radius * Math.cos(endAngle);
        const y2 = radius * Math.sin(endAngle);
        const largeArc = arc > Math.PI ? 1 : 0;
        const pathData = `M 0 0 L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;

        // หมุนข้อความ
        const angle = startAngle + arc / 2;
        const textRadius = radius * 0.65;
        const tx = textRadius * Math.cos(angle);
        const ty = textRadius * Math.sin(angle);
        const deg = angle * 180 / Math.PI;

        return `
          <g>
            <path d="${pathData}" fill="${defaultColors[i % defaultColors.length]}" stroke="#fff" stroke-width="2" />
            <text x="${tx}" y="${ty}" 
              text-anchor="middle" alignment-baseline="middle" 
              fill="#222" font-size="${segments.length > 20 ? 10 : 14}" font-weight="bold"
              transform="rotate(${deg}, ${tx}, ${ty})"
            >${seg}</text>
          </g>
        `;
      }).join('');

      return `<svg width="100%" height="100%" viewBox="-180 -180 360 360" style="overflow:visible;">
        ${paths}
      </svg>`;
    }
